<style>
/* =====================================================================
   BADEN BOWER, HOMEPAGE, PRODUCTION BUILD OF THE APPROVED DESIGN
   Design system v4 "Editorial Print". Scope prefix: #bbhp.
   Shared stylesheet — kept identical in both the HERO and BODY widgets
   so each widget is self-contained and order-independent in Elementor.
   ===================================================================== */
#bbhp{--navy:#0B1E3D;--gold:#C9A84C;--dgold:#7a6222;--cream:#F7F5F0;
  --ink:#1B2A44;--grey:#5B6577;--hair:rgba(11,30,61,.28);
  --serif:'Newsreader',Georgia,serif;--sans:'Radio Canada',system-ui,sans-serif}
#bbhp *,#bbhp *::before,#bbhp *::after{box-sizing:border-box;margin:0;padding:0}
#bbhp{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
#bbhp img{max-width:100%;display:block}
#bbhp a{color:inherit;text-decoration:none}
#bbhp .wrap{max-width:1200px;margin:0 auto;padding:0 40px}
#bbhp a:focus-visible,#bbhp button:focus-visible,#bbhp input:focus-visible,#bbhp textarea:focus-visible,#bbhp summary:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
#bbhp .txtlink{color:var(--navy);font-weight:600;border-bottom:2px solid var(--gold)}

/* Scotch rule kicker */
#bbhp .kick{display:inline-block;min-width:220px;border-top:3px solid var(--navy);padding-top:2px}
#bbhp .kick .thin{border-top:1px solid var(--navy);margin-bottom:14px}
#bbhp .kick span{font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--navy)}
#bbhp .kick span b{color:var(--gold);font-weight:700}
#bbhp .kick.onnavy{border-top-color:#fff}
#bbhp .kick.onnavy .thin{border-top-color:rgba(255,255,255,.6)}
#bbhp .kick.onnavy span{color:#fff}

/* display type */
#bbhp .h2{font-family:var(--serif);font-weight:600;font-size:clamp(28px,3.6vw,44px);line-height:1.1;color:var(--navy);margin:24px 0 0}

/* letterpress buttons (all <a> or spans; never <button> for Elementor) */
#bbhp .btn{display:inline-block;font-family:var(--sans);font-weight:700;font-size:15px;padding:16px 32px;border-radius:0;
  background:var(--navy);color:#fff;box-shadow:4px 4px 0 var(--gold);cursor:pointer;border:none;
  transition:transform 160ms ease,box-shadow 160ms ease}
#bbhp .btn.alt{background:var(--cream);color:var(--navy)}
#bbhp .btn:hover{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--gold)}
#bbhp .btn.ghost{background:transparent;color:#fff;border:1.5px solid #fff;box-shadow:none;padding:14.5px 30.5px;
  transition:background 160ms ease,color 160ms ease}
#bbhp .btn.ghost:hover{transform:none;background:#fff;color:var(--navy)}
@media(prefers-reduced-motion:reduce){#bbhp .btn,#bbhp .btn.ghost{transition:none}#bbhp .btn:hover{transform:none}}

/* registration-square list */
#bbhp .marks{list-style:none;display:grid;gap:11px;font-size:15px;color:#E7ECF4}
#bbhp .marks li{position:relative;padding-left:22px;line-height:1.5}
#bbhp .marks li::before{content:'';position:absolute;left:0;top:.42em;width:9px;height:9px;background:var(--gold)}

/* ============================ HERO ================================= */
#bbhp .hero{position:relative;background:var(--navy);overflow:hidden}
#bbhp .hero .bg{position:absolute;inset:0;background-size:cover;background-position:right center;
  background-image:url('https://www.badenbower.com/wp-content/uploads/2026/04/Yahoo-Finance-Hero-Video-Fallback.jpg')}
#bbhp .hero .ov{position:absolute;inset:0;
  background:linear-gradient(95deg,rgba(11,30,61,.98) 0%,rgba(11,30,61,.94) 38%,rgba(11,30,61,.66) 62%,rgba(11,30,61,.32) 100%)}
#bbhp .hero .inner{position:relative;max-width:1200px;margin:0 auto;padding:170px 40px 180px}
#bbhp .hero .copy{max-width:560px}
#bbhp .hero h1{font-family:var(--serif);font-weight:600;font-size:clamp(38px,4.9vw,60px);line-height:1.05;letter-spacing:-0.015em;color:#fff;margin:26px 0 0}
#bbhp .hero h1 em{font-style:italic;font-weight:500;color:var(--gold)}
#bbhp .hero .sub{font-size:17.5px;line-height:1.6;color:rgba(255,255,255,.82);margin:22px 0 0}
#bbhp .hero .ctas{display:flex;gap:18px;flex-wrap:wrap;margin-top:34px}

#bbhp .stamp{position:absolute;right:9%;top:96px;width:168px;height:168px;border:3px double var(--gold);border-radius:50%;
  transform:rotate(-9deg);display:grid;place-items:center}
#bbhp .stamp .in{width:140px;height:140px;border:1px solid var(--gold);border-radius:50%;display:grid;place-items:center;

/* ============================ INDEX ================================ */
#bbhp .index{background:#fff;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair)}

  border-left:1px solid var(--hair);border-top:1px solid var(--hair);overflow:hidden}
#bbhp .igrid .icel:nth-child(-n+5){border-top:none}

/* Logos: 44px base with the live site's per-logo scale factors (inline

#bbhp .icel img{transform-origin:center;max-height:44px;width:auto;max-width:100%;object-fit:contain}

#bbhp .icel.noimg .nm,#bbhp .mast.noimg .nm{display:block}
#bbhp .nm-more{font-weight:600;font-size:14px;color:var(--grey)}
/* masthead type treatments used by press fallback names */
#bbhp .mast .nm-forbes{font-family:var(--serif);font-weight:700;font-size:22px}
#bbhp .mast .nm-bi{font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:.04em}
#bbhp .mast .nm-ent{font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:.06em}

/* ============================ METHOD =============================== */
#bbhp .method{background:var(--cream)}

#bbhp .steps h3{font-family:var(--serif);font-weight:600;font-size:21px;color:var(--navy)}

#bbhp .guar{background:var(--navy)}

#bbhp .compare{background:var(--cream)}
#bbhp .compare .inner{max-width:1200px;margin:0 auto;padding:92px 40px 0}
